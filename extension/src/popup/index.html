<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pinta</title>
    <script>
      // Apply theme class before paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var t = localStorage.getItem("pinta-theme");
          if (!t)
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="w-72">
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
